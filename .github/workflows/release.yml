name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-plugin:
    name: plugin / ${{ matrix.artifact_out }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: ccflux
            artifact_out: ccflux-linux-x86_64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            bin: ccflux
            artifact_out: ccflux-linux-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            bin: ccflux
            artifact_out: ccflux-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: ccflux
            artifact_out: ccflux-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ccflux.exe
            artifact_out: ccflux-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ccflux-core
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: ccflux-core

      - name: Stage artifact
        shell: bash
        run: cp ccflux-core/target/${{ matrix.target }}/release/${{ matrix.bin }} ${{ matrix.artifact_out }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_out }}
          path: ${{ matrix.artifact_out }}

  build-receiver:
    name: receiver / ${{ matrix.artifact_out }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_out: ccflux-receiver-linux-x86_64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_out: ccflux-receiver-linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: receiver
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: receiver

      - name: Stage artifact
        run: cp receiver/target/${{ matrix.target }}/release/ccflux-receiver ${{ matrix.artifact_out }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_out }}
          path: ${{ matrix.artifact_out }}

  release:
    name: Create GitHub Release
    needs: [build-plugin, build-receiver]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts/

      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md \
            | sed '/^[[:space:]]*$/d' > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for $VERSION" > release_notes.md
          fi

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: release_notes.md
