name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: ccflux-linux-x86_64
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            bin_name: ccflux-linux-aarch64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            bin_name: ccflux-macos-x86_64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            bin_name: ccflux-macos-aarch64
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin_name: ccflux-windows-x86_64.exe
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        working-directory: ccflux-core
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: '!matrix.use_cross'
        working-directory: ccflux-core
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          strip ccflux-core/target/${{ matrix.target }}/release/ccflux

      - name: Rename binary
        shell: bash
        run: |
          SRC="ccflux-core/target/${{ matrix.target }}/release/ccflux"
          [[ "${{ matrix.os }}" == "windows-latest" ]] && SRC="${SRC}.exe"
          cp "${SRC}" "plugin/bin/${{ matrix.bin_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin_name }}
          path: plugin/bin/${{ matrix.bin_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: plugin/bin

      - name: Flatten artifacts
        run: |
          find plugin/bin -mindepth 2 -type f -exec mv {} plugin/bin/ \;
          find plugin/bin -type d -empty -delete

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: plugin/bin/ccflux-*
          generate_release_notes: true
